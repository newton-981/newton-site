<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300">
  <!-- Title -->
  <text x="380" y="28" text-anchor="middle"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="17" font-weight="600" letter-spacing="-0.3" fill="#e2e8f0">Time Spent Doing Math</text>

  <!-- Legend -->
  <rect x="255" y="44" width="12" height="12" rx="3" fill="#3B82F6"/>
  <text x="273" y="55"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="12" fill="#64748b">Thinking</text>
  <rect x="343" y="44" width="12" height="12" rx="3" fill="#EF4444"/>
  <text x="361" y="55"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="12" fill="#64748b">Programming</text>

  <!-- Y-axis line -->
  <line x1="215" y1="72" x2="215" y2="252" stroke="#334155" stroke-width="1"/>

  <!-- Vertical grid lines -->
  <line x1="390" y1="72" x2="390" y2="252" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="565" y1="72" x2="565" y2="252" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="740" y1="72" x2="740" y2="252" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Baseline -->
  <line x1="215" y1="252" x2="740" y2="252" stroke="#334155" stroke-width="1"/>

  <!-- X-axis labels: 0=215, 20=390, 40=565, 60=740 -->
  <text x="215" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">0</text>
  <text x="390" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">20</text>
  <text x="565" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">40</text>
  <text x="740" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">60</text>

  <!-- ROW 1: code, spreadsheets, existing software (bars y=100..153) -->
  <text x="210" y="121" text-anchor="end"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="12" fill="#94a3b8">code, spreadsheets,</text>
  <text x="210" y="138" text-anchor="end"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="12" fill="#94a3b8">existing software</text>

  <!-- Blue bar: 8 units = 70px — left corners rounded only (rx=7) -->
  <path d="M 222,100 L 285,100 L 285,153 L 222,153 Q 215,153 215,146 L 215,107 Q 215,100 222,100 Z" fill="#3B82F6"/>
  <!-- Red bar: 52 units = 455px — right corners rounded only (rx=7) -->
  <path d="M 285,100 L 733,100 Q 740,100 740,107 L 740,146 Q 740,153 733,153 L 285,153 Z" fill="#EF4444"/>
  <text x="296" y="132"
